name: add kernel optimizations
description: apply patches from kernel patches repo for kernel optimization

runs:
 using: composite
 steps:
  - name: apply patches
    shell: bash
    run: |
     cd "$COMMON"

     # CAUSES COMPILE ERROR-p1 -F 3 < "$KERNEL_PATCHES/common/add_limitation_scaling_min_freq.patch"
     # PATCH FAILS ON ONEUI 8.5patch -p1 -F 3 < "$KERNEL_PATCHES/common/avoid_extra_s2idle_wake_attempts.patch"
     

     #good patches that work
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/add_timeout_wakelocks_globally.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/adjust_cpu_scan_order.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/clear_page_16bytes_align.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/disable_cache_hot_buddy.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/f2fs_enlarge_min_fsync_blocks.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/f2fs_reduce_congestion.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/file_struct_8bytes_align.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/force_tcp_nodelay.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/increase_ext4_default_commit_age.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/increase_sk_mem_packets.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/int_sqrt.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/mem_opt_prefetch.patch"
     patch -p1 -F 3 < "$KERNEL_PATCHES/common/minimise_wakeup_time.patch"

     #test for organizing
     if [ "$(printf '%s\n' "$KERNEL_VERSION" "$MIN_VERSION" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          patch -p1 --forward < "$KERNEL_PATCHES_FOLDER/common/optimise_memcmp.patch"
     elif [ "$(printf '%s\n' "$KERNEL_VERSION" "5.11" | sort -V | tail -n1)" = "$KERNEL_VERSION" ]; then
          sed -e 's/SYM_FUNC_START(__pi_memcmp)/SYM_FUNC_START_WEAK_PI(memcmp)/' -e 's/SYM_FUNC_END(__pi_memcmp)/SYM_FUNC_END_PI(memcmp)/' -e 's/SYM_FUNC_ALIAS_WEAK(memcmp, __pi_memcmp)/EXPORT_SYMBOL_NOKASAN(memcmp)/' "$KERNEL_PATCHES_FOLDER/common/optimise_memcmp.patch" | patch -p1 --forward
     else
          echo "Optimised memcmp patch not found!"
     fi
