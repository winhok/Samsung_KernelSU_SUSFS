name: add configs
description: add configs and disabling securities
inputs:
 branch:
   description: 'which device kernel'
   required: true
 profile:
   description: 'Samsung security profile: nuke, stock-security, or rot06-minimal'
   required: false
   default: 'nuke'

runs:
 using: composite
 steps:
  - name: add mountify support
    shell: bash
    run: |
     cat >> "$GKI_DEFCONFIG" << 'EOF'
     # Mountify Support
     CONFIG_OVERLAY_FS=y
     CONFIG_TMPFS_XATTR=y
     CONFIG_TMPFS_POSIX_ACL=y
     EOF

  - name: increase log buffer size for showing bbg on ksu manager homepage
    shell: bash
    run: |
     cat >> "$GKI_DEFCONFIG" << 'EOF'
     # increase log buffer size to show bbg version in wksu homepage
     CONFIG_LOG_BUF_SHIFT=20
     EOF

  - name: apply Samsung security profile
    shell: bash
    run: |
     set -euo pipefail
     target_config=""
     
     if [[ ${{ inputs.branch }} == SM-S938B* || "${{ inputs.branch }}" == "SM-S931B-Oneui8" ]]; then
         echo "Nothing to see here, moving on..."
     elif [[ "${{ inputs.branch }}" == SM-S926B* ]]; then
         target_config="$COMMON/arch/arm64/configs/s5e9945-bazel_defconfig"
     elif [[ "${{ inputs.branch }}" == SM-A556* ]]; then
         target_config="$COMMON/arch/arm64/configs/s5e8845-bazel_defconfig"
     else
         target_config="$GKI_DEFCONFIG"
     fi
     
     if [ -z "$target_config" ]; then
      echo "No Samsung security profile changes required for this target."
      exit 0
     fi

     case "${{ inputs.profile }}" in
      stock-security)
       echo "Keeping stock Samsung security configuration in: $target_config"
       ;;
      rot06-minimal)
       echo "Keeping UH/RKP/KDP while disabling only DEFEX/PROCA/FIVE in: $target_config"
       cat >> "$target_config" << 'EOF'
     # ROT06 experiment: retain UH/RKP/KDP trust path
     CONFIG_SECURITY_DEFEX=n
     CONFIG_PROCA=n
     CONFIG_FIVE=n
     EOF
       ;;
      nuke)
       echo "Nuking Samsung Knox/Root protection in: $target_config"
       cat >> "$target_config" << 'EOF'
     # nuke root protection
     CONFIG_UH=n
     CONFIG_UH_RKP=n
     CONFIG_UH_LKMAUTH=n
     CONFIG_UH_LKM_BLOCK=n
     CONFIG_RKP_CFP_JOPP=n
     CONFIG_RKP_CFP=n
     CONFIG_SECURITY_DEFEX=n
     CONFIG_PROCA=n
     CONFIG_FIVE=n
     CONFIG_RKP=n
     CONFIG_KDP_NS=n
     CONFIG_KDP=n
     EOF
       ;;
      *)
       echo "Unsupported Samsung security profile: ${{ inputs.profile }}" >&2
       exit 1
       ;;
     esac

  - name: remove check_defconfig
    shell: bash
    run: |
     cd "$COMMON"
     # Remove check_defconfig
     sed -i 's/check_defconfig//' ./build.config.gki
