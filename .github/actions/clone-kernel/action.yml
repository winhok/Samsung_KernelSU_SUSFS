name: 'Download Samsung Kernels'
description: "initialize and download the samsung kernel"

inputs:
  branch:
    description: 'Device Kernel branch'
    required: true

runs:
 using: composite
 steps:
   - name: Clone Kernel Source
     shell: bash
     run: |
      set -euo pipefail
      test "${{ inputs.branch }}" = "SM-S918B-Oneui7"
      source_commit="cbaa6b3d5a28e8a023aa4504c1726329bd6d867a"
      git init "$CONFIG"
      git -C "$CONFIG" remote add origin https://github.com/WildKernels/Samsung_Kernels.git
      git -C "$CONFIG" fetch --depth=1 origin "$source_commit"
      git -C "$CONFIG" checkout --detach FETCH_HEAD
      test "$(git -C "$CONFIG" rev-parse HEAD)" = "$source_commit"
