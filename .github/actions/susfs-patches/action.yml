name: apply susfs patches
description: apply susfs patches
inputs:
  android_version:
   description: 'Android version (android14)'
   required: true
  kernel_version:
   description: 'Kernel version (6.1)'
   required: true
  branch:
   description: 'device kernel'
   required: true
  nomount:
   description: 'nomount'
   required: true

runs:
  using: composite
  steps:
   - name: Apply to KSUN
     shell: bash
     run: |
       #cd "$COMMON/KernelSU-Next"
       #SUSFS_VERSION="v2.1.0"
          
       # Apply SUSFS to KernelSU-Next
       #cp "$SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" .
       #patch -p1 < 10_enable_susfs_for_ksu.patch || true
       #rm -rf 10_enable_susfs_for_ksu.patch

       #Fix rejects from adding susfs to KSUN
       #cp "$KERNEL_PATCHES/next/susfs_fix_patches/$SUSFS_VERSION/"*.patch .
       #rm -rf multi_manager.patch
       #for p in *.patch; do
       #    patch -p1 < "$p"
       #    rm -f "$p"
       #done
       
   - name: Copy required files
     shell: bash
     run: |
      # Apply SUSFS to kernel
      cd "$COMMON"
      cp "$SUSFS4KSU/kernel_patches/fs/"* ./fs/
      cp "$SUSFS4KSU/kernel_patches/include/linux/"* ./include/linux/
      cp "$SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch" ./          

   - name: prepare namespace and open.c for susfs patch because scamsung
     shell: bash
     run: |
      cd "$COMMON"
      #Prepare open.c for susfs patching
      sed -i '/#ifdef CONFIG_SECURITY_DEFEX/,/^#endif/d' fs/open.c

      #Prepare namespace.c for susfs patching
      sed -i '/copy_flags = CL_COPY_UNBINDABLE | CL_EXPIRE;/,/#endif/ {
        /#ifdef CONFIG_KDP_NS/,/#endif/ {
           /#else/,/#endif/!d
           /#else/d
           /#endif/d
        }
       }' fs/namespace.c
          
   - name: apply susfs patch and fix if necessary
     shell: bash
     run: |
      set -euo pipefail
      cd "$COMMON"
      # The generic SUSFS patch has three known context conflicts in Samsung's
      # dm3q tree.  Permit only those rejects, then resolve them with the
      # device-specific patch below.  Any additional reject is fatal.
      set +e
      patch --fuzz=0 -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch
      core_status=$?
      set -e
      if [ "$core_status" -gt 1 ]; then
       echo "SUSFS core patch failed with status $core_status" >&2
       exit "$core_status"
      fi

      mapfile -t core_rejects < <(find . -type f -name '*.rej' -printf '%P\n' | sort)
      expected_rejects=()
      if [ "${{ inputs.branch }}" = "SM-S918B-Oneui7" ]; then
       expected_rejects=("fs/namespace.c.rej" "fs/proc/task_mmu.c.rej")
      fi
      if [ "${core_rejects[*]}" != "${expected_rejects[*]}" ]; then
       echo "Unexpected SUSFS core rejects: ${core_rejects[*]:-none}" >&2
       exit 1
      fi
      rm -rf 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch

      shopt -s nullglob
      patches=("$KERNEL_PATCHES/samsung/${{ inputs.branch }}"/*.patch)
      if [ "${{ inputs.branch }}" = "SM-S918B-Oneui7" ]; then
       patches+=("${{ github.action_path }}/patches/SM-S918B-Oneui7"/*.patch)
      fi
      
      if [ ${#patches[@]} -gt 0 ]; then
       echo "Patches found, applying..."
       cp "${patches[@]}" ./
       
       # Fix SUSFS rejects
        for p in *.patch; do
          patch --fuzz=0 -p1 < "$p"
          rm -f "$p"
        done
        shopt -u nullglob
      else
        echo "No patch file found, skipping"
      fi

      rm -f "${expected_rejects[@]}"
      if find . -type f -name '*.rej' -print -quit | grep -q .; then
       echo "Patch reject detected" >&2
       find . -type f -name '*.rej' -print >&2
       exit 1
      fi

   - name: add ksu-susfs to config
     shell: bash
     run: |
      cat >> "$GKI_DEFCONFIG" << 'EOF'
      # SUSFS Configuration
      CONFIG_KSU_SUSFS=y
      EOF
