name: prepare ak3
description: copy kernel image to ak3 folder
inputs:
 branch:
  description: 'device kernel/repo'
  required: true

runs:
 using: composite
 steps:
     
  - name: copy image to ak3 folder depending on branch
    shell: bash
    run: |
     cd "$CONFIG"
     # 1. Determine target file name based on branch structure
     if [[ "${{ inputs.branch }}" == SM-A055* || "${{ inputs.branch }}" == SM-X926* || "${{ inputs.branch }}" == "SM-A075M-Oneui7" ]]; then
         target_name="Image.gz"
     else
         target_name="Image"
     fi
     
     shopt -s globstar
     shopt -s nocaseglob

     KERNEL_IMAGE=""
     priority_found=false
     fallback_images=()
     search_roots=("." "kernel_platform/out" "kernel_platform/bazel-cache" "out")

     # ==========================================
     # PHASE 1: DIRECT BAZEL DEPENDENCY QUERY (SMART)
     # ==========================================
     for priority in "kbuild_mixed_tree" "dist" "boot" "kernel_aarch64" ".user"; do
      for root in "${search_roots[@]}"; do
       if [ -d "$root" ]; then
            
        # Place the wildcard * directly in the path syntax so Bash expands it natively
         for file in "$root"/**/*"$priority"/"$target_name"; do
           if [ -f "$file" ] && [[ "$file" != *".git"* ]]; then
               KERNEL_IMAGE="$file"
               priority_found=true
               break 3 # Lock in and break out of all three loops immediately
           fi
          done
        fi
       done
      done


     # ==========================================
     # PHASE 3: DEEP WORKSPACE FALLBACK DISCOVERY
     # ==========================================
     if [ "$priority_found" = false ]; then
         echo "Priority folder target missing. Running complete disk scan..."
         for root in "${search_roots[@]}"; do
             if [ -d "$root" ]; then
                 for file in "$root"/**/"$target_name"; do
                     if [ -f "$file" ] && [[ "$file" != *".git"* ]]; then
                         if [[ ! " ${fallback_images[*]} " =~ " ${file} " ]]; then
                             fallback_images+=("$file")
                         fi
                    fi
                 done
             fi
         done
         
         if [ ${#fallback_images[@]} -gt 0 ]; then
             KERNEL_IMAGE="${fallback_images[0]}"
         fi
     fi
     
     shopt -u nocaseglob
     
     # ==========================================
     # VALIDATION AND LOGGING OUTPUT
     # ==========================================
     if [ "$priority_found" = true ]; then
         echo "========================================================"
         echo "SUCCESS: Selected kernel binary path:"
         echo "  -> $KERNEL_IMAGE"
         echo "========================================================"
     else
         echo "WARNING: Could not locate '$target_name' inside specified priority targets!"
         
         if [ ${#fallback_images[@]} -eq 0 ]; then
             echo "ERROR: The file was not found ANYWHERE in the workspace. Compilation likely failed."
             exit 1
         else
             echo "--------------------------------------------------------"
             echo "DISCOVERY MODE: Found the following alternative locations:"
             echo "--------------------------------------------------------"
             for fallback in "${fallback_images[@]}"; do
                 echo "  -> $fallback"
             done
             echo "--------------------------------------------------------"
             echo "Action Required: Update your script matching rules using a parent folder named above."
             exit 1
         fi
     fi


