name: Set up KernelSU-Next
description: download and set up KSUN into the kernel source
inputs:
 susfs:
  description: 'susfs'
  required: true
 manager_cert:
  description: 'Production Manager identity as 0x<DER length hex>:<SHA-256>'
  required: false
  default: ''


runs:
  using: composite
  steps:
    - name: Setup pinned official KernelSU-Next without SUSFS
      if: inputs.susfs == 'false'
      shell: bash
      run: |
        set -euo pipefail
        KSUN_COMMIT="3b18216f71df189ab3d1b1ce0bdb21be1268e771"
        cd "$COMMON"
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/$KSUN_COMMIT/kernel/setup.sh" | bash -s stable
        git -C KernelSU-Next fetch --no-tags origin "$KSUN_COMMIT"
        git -C KernelSU-Next checkout --detach "$KSUN_COMMIT"
        test "$(git -C KernelSU-Next rev-parse HEAD)" = "$KSUN_COMMIT"

    - name: Setup pinned SUSFS-compatible KernelSU-Next
      if: inputs.susfs == 'true'
      shell: bash
      run: |
        set -euo pipefail
        KSUN_COMMIT="032b799f2a4dbd2235fc462cadacbdfd7bffef33"
        cd "$COMMON"
        # The setup script's clone may not contain an arbitrary pinned commit's
        # tree when the commit is outside the remote default branch.  Establish
        # the SUSFS branch first, then fetch and detach at the audited SHA.
        curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/$KSUN_COMMIT/kernel/setup.sh" | bash -s dev-susfs
        git -C KernelSU-Next fetch --no-tags origin "$KSUN_COMMIT"
        git -C KernelSU-Next checkout --detach "$KSUN_COMMIT"
        test "$(git -C KernelSU-Next rev-parse HEAD)" = "$KSUN_COMMIT"

    - name: Configure KernelSU-Next
      shell: bash
      run: |
        set -euo pipefail
        cd "$COMMON"
        # The official stable tree accepts one Manager identity through
        # SIZE/HASH, while the audited SUSFS fork accepts a comma-separated
        # Manager list.  The private signing key never enters GitHub Actions.
        MANAGER_CERT="${{ inputs.manager_cert }}"
        if [ -n "$MANAGER_CERT" ]; then
          "$GITHUB_WORKSPACE/.github/scripts/validate-manager-cert.sh" "$MANAGER_CERT"
          if [ "${{ inputs.susfs }}" = "false" ]; then
            MANAGER_SIZE="${MANAGER_CERT%%:*}"
            MANAGER_HASH="${MANAGER_CERT#*:}"
            sed -i "s/^KSU_NEXT_MANAGER_SIZE := .*/KSU_NEXT_MANAGER_SIZE := $MANAGER_SIZE/" KernelSU-Next/kernel/Kbuild
            sed -i "s/^KSU_NEXT_MANAGER_HASH := .*/KSU_NEXT_MANAGER_HASH := $MANAGER_HASH/" KernelSU-Next/kernel/Kbuild
            grep -Fxq "KSU_NEXT_MANAGER_SIZE := $MANAGER_SIZE" KernelSU-Next/kernel/Kbuild
            grep -Fxq "KSU_NEXT_MANAGER_HASH := $MANAGER_HASH" KernelSU-Next/kernel/Kbuild
          else
            sed -i "/^KSU_NEXT_MANAGER_LIST := / s/$/,$MANAGER_CERT/" KernelSU-Next/kernel/Kbuild
            grep -Fq "$MANAGER_CERT" KernelSU-Next/kernel/Kbuild
          fi
        fi
        
        cd "$GITHUB_WORKSPACE"
        cat >> "$GKI_DEFCONFIG" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF

    - name: Extract KSU Version Info and inject into Kbuild
      shell: bash
      run: |
        cd "$COMMON/KernelSU-Next"

        # Fetch dev branch for version info (tags, commits, etc.)
        git fetch origin dev 2>/dev/null
        
        # Match KSUN's own Kbuild/Manager version rule: count the pinned
        # commit's merge-base with the official dev branch, not the moving
        # tip of origin/dev.
        BASE_COMMIT=$(git merge-base HEAD refs/remotes/origin/dev)
        KSU_GIT_VERSION=$(git rev-list --count "$BASE_COMMIT")
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 "$BASE_COMMIT" 2>/dev/null || echo "")
        KSU_COMMIT=$(git rev-parse --short HEAD)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))

        cd kernel
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

    - name: 'Fix KernelSU-Next'
      if: inputs.susfs == 'true'
      shell: bash
      run: |
        set -euo pipefail
        cd "$COMMON/KernelSU-Next"
        cp ${{ github.action_path }}/patches/static.patch ./
        patch -p1 < static.patch
